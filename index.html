<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>project0111</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="main.css">
<link rel="stylesheet" href="chapter1.css">
<link rel="stylesheet" href="tree.css">
<link rel="stylesheet" href="ambient.css">
</head>
<body>

  <div id="scene">

    <!-- Shown only in portrait; disappears once she rotates -->
    <div id="rotate-prompt">
      <div class="icon">📱</div>
      <p>turn your phone sideways...<br>there's a world waiting</p>
    </div>

    <!-- The living world — always present underneath; the ignite/reveal
         happens via #reveal-hole below, not by fading #world itself -->
    <div id="world">
      <div id="tree-wrap">
        <img class="tree-layer" src="tree-lineart.webp" alt="">
        <div id="tree-nodes"></div>
      </div>
      <div id="opening-line">
        <!-- placeholder line — replace with the real opening line, in your own words -->
        every story starts small.
      </div>
    </div>

    <!-- The big reveal: expands from a point when she first reaches landscape -->
    <div id="reveal-hole"></div>

  </div>

  <script src="main.js"></script>
  <script src="audio.js"></script>
  <script src="tree.js"></script>
  <script src="ambient.js"></script>
  <script src="chapter1.js"></script>
</body>
</html>
